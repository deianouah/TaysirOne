name: CI/CD to Ubuntu Server

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}      # تأكد أن هذا هو الاسم في GitHub Secrets
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "."
          target: "/home/whatsway"      # تأكد أن هذا المجلد موجود في السيرفر

      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /home/whatsway
            # تأكد من وجود ملف اسمه deploy.sh داخل مشروعك
            if [ -f "deploy.sh" ]; then
              chmod +x deploy.sh
              ./deploy.sh
            else
              echo "deploy.sh not found!"
            fi